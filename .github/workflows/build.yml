name: Android Build

# 手动触发，不自动响应 push 或 pull_request
on:
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码 (Updated to v4)
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 设置 JDK 环境 (Updated to v4)
      # 该项目使用的 Android Gradle Plugin 版本为 7.1.2，推荐使用 Java 11
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: gradle

      # 3. 赋予 gradlew 执行权限
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 4. 编译 Debug 版本的 APK
      - name: Build Debug APK
        run: ./gradlew assembleDebug

      # 5. 上传生成的 APK 作为 Artifact (Updated to v4)
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: yunmei-unintelligent-debug-apk
          path: app/build/outputs/apk/debug/*.apk
